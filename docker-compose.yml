version: '3.8'

services:
  # OAuth2 Proxy for authentication
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    ports:
      - "4180:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:4180/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://web:3000
      OAUTH2_PROXY_EMAIL_DOMAINS: '*'
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_SET_XAUTHREQUEST: true
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: true
      OAUTH2_PROXY_PASS_USER_HEADERS: true
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: true
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: false
      # Optional: restrict to specific Google Workspace domain
      # OAUTH2_PROXY_GOOGLE_GROUP: your-workspace-domain.com
      # OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL: admin@your-workspace-domain.com
      # OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON: /path/to/service-account.json
    depends_on:
      - web
    networks:
      - app-network

  # Rails application
  web:
    build: .
    container_name: rails-app
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:password@db:5432/dynamic_links_development
      RAILS_ENV: development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    networks:
      - app-network
    command: bundle exec rails server -b 0.0.0.0

  # PostgreSQL database
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: dynamic_links_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis for caching and background jobs
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  bundle_cache:

networks:
  app-network:
    driver: bridge